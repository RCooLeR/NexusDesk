<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
    
    <defs>
      <linearGradient id="ringGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#7C3AED"/>
        <stop offset="48%" stop-color="#2563EB"/>
        <stop offset="100%" stop-color="#38BDF8"/>
      </linearGradient>
      <linearGradient id="ringGrad2" x1="0" y1="512" x2="512" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#7C3AED"/>
        <stop offset="50%" stop-color="#2563EB"/>
        <stop offset="100%" stop-color="#38BDF8"/>
      </linearGradient>
      <linearGradient id="silverGrad" x1="90" y1="80" x2="380" y2="420" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FFFFFF"/>
        <stop offset="28%" stop-color="#F8FAFC"/>
        <stop offset="57%" stop-color="#D1D5DB"/>
        <stop offset="100%" stop-color="#FFFFFF"/>
      </linearGradient>
      <linearGradient id="darkNGrad" x1="90" y1="80" x2="380" y2="420" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#111827"/>
        <stop offset="100%" stop-color="#0B0F1F"/>
      </linearGradient>
      <linearGradient id="deskGrad" x1="0" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#7C3AED"/>
        <stop offset="52%" stop-color="#2563EB"/>
        <stop offset="100%" stop-color="#38BDF8"/>
      </linearGradient>
      <linearGradient id="appBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#151B3A"/>
        <stop offset="56%" stop-color="#0B0F1F"/>
        <stop offset="100%" stop-color="#050814"/>
      </linearGradient>
      <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="7" result="blur"/>
        <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.49  0 0 0 0 0.23  0 0 0 0 0.93  0 0 0 0.65 0"/>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.24"/>
      </filter>
    </defs>
    
    <rect width="1920" height="1080" fill="url(#appBg)"/>
    <circle cx="240" cy="190" r="450" fill="#151B3A" opacity="0.65"/>
    <circle cx="1770" cy="860" r="520" fill="#101D4A" opacity="0.65"/>
    <g transform="translate(600 210) scale(0.8)">
      
      <g id="nexusdesk-symbol">
        <g opacity="0.22" transform="rotate(-24 256 256)">
          <ellipse cx="256" cy="256" rx="215" ry="80" fill="none" stroke="url(#ringGrad)" stroke-width="4"/>
          <ellipse cx="256" cy="256" rx="242" ry="94" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="9 15"/>
        </g>
        <g transform="rotate(-24 256 256)" filter="url(#softGlow)">
          <ellipse cx="256" cy="256" rx="210" ry="78" fill="none" stroke="url(#ringGrad)" stroke-width="19" stroke-linecap="round"/>
        </g>
        <g opacity="0.60" transform="rotate(19 256 256)">
          <ellipse cx="256" cy="256" rx="245" ry="91" fill="none" stroke="#C7D2FE" stroke-width="2" stroke-dasharray="14 20"/>
        </g>
        <g>
          <path d="M128 106 H193 V404 H128 Z" fill="url(#silverGrad)" opacity="1"/>
          <path d="M321 106 H386 V404 H321 Z" fill="url(#silverGrad)" opacity="1"/>
          <path d="M184 106 H247 L382 404 H319 Z" fill="url(#silverGrad)" opacity="1"/>
          <path d="M128 106 H193 L386 404 H321 Z" fill="#FFFFFF" opacity="0.08"/>
        </g>
        <g transform="rotate(-24 256 256)">
          <circle cx="67" cy="256" r="22" fill="#7C3AED" stroke="#EDE9FE" stroke-width="6"/>
          <circle cx="256" cy="178" r="18" fill="#7C3AED" stroke="#EDE9FE" stroke-width="5"/>
          <circle cx="466" cy="256" r="18" fill="#38BDF8" stroke="#DBEAFE" stroke-width="5"/>
          <circle cx="256" cy="334" r="20" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="5"/>
          <circle cx="363" cy="196" r="13" fill="#2563EB" stroke="#BFDBFE" stroke-width="4"/>
        </g>
      </g>
    
    </g>
    <text x="960" y="670" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="105" font-weight="760" letter-spacing="-5">
      <tspan fill="#FFFFFF">Nexus</tspan><tspan fill="url(#deskGrad)">Desk</tspan>
    </text>
    <text x="960" y="735" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" fill="#CBD5E1">
      AI Workbench for Code, Data &amp; Ops
    </text>
    <rect x="0" y="1064" width="640" height="16" fill="#7C3AED"/>
    <rect x="640" y="1064" width="640" height="16" fill="#2563EB"/>
    <rect x="1280" y="1064" width="640" height="16" fill="#38BDF8"/>
    </svg>