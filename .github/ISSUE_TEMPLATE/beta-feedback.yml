name: Beta feedback
description: Report NexusDesk beta feedback without leaking workspace data or secrets.
title: "[Beta] "
labels:
  - beta-feedback
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping harden NexusDesk. Please redact private workspace data, API keys, connector credentials, bearer tokens, DSNs, customer data, and production logs before submitting.
  - type: input
    id: app_version
    attributes:
      label: App version, commit, and build date
      description: Copy these from Help > About Nexus.
      placeholder: "Version 1.0.0-beta.1, commit abcdef123456, build 2026-05-30T12:00:00Z"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Startup or workspace open
        - Editor or project tree
        - Assistant or agent
        - Approvals, audit, or rollback
        - Data sources or SQL
        - Artifacts, history, or export
        - Jobs, diagnostics, or issue report
        - Packaging, install, update, or uninstall
        - Settings or provider setup
        - Other
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: Goal, expected result, and actual result
      description: Explain the workflow you tried, what you expected, and what happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include only safe, redacted steps. Do not attach private workspace files unless specifically requested by maintainers.
      placeholder: |
        1. Opened a small trusted workspace.
        2. Ran Diagnostics.
        3. Clicked ...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics or issue report notes
      description: Paste the visible error, redacted Diagnostics summary, or the name of an exported issue report bundle. Do not paste secrets or raw private logs.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I removed API keys, passwords, bearer tokens, DSNs, connector secrets, and private workspace content.
          required: true
        - label: I checked Jobs, Agent Audit, History, Rollbacks, or Diagnostics when relevant.
          required: false
        - label: I can reproduce this on a clean or sample workspace.
          required: false
